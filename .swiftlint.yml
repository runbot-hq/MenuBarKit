# SwiftLint configuration for MenuBarKit
# https://github.com/realm/SwiftLint

included:
  - Sources

excluded:
  - .build
  - Package.swift
  - Tests

# ── Opt-in rules ──────────────────────────────────────────────────────────────
opt_in_rules:
  - closure_spacing
  - explicit_init
  - sorted_imports
  - vertical_whitespace_closing_braces
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - first_where
  - missing_docs
  - file_header

# ── Rule configuration ────────────────────────────────────────────────────────
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - w
    - h
    - i
    - j
    - k
    - n

missing_docs:
  warning: [open, public, internal, private, fileprivate]
  excludes_extensions: false
  excludes_inherited_types: false

file_header:
  required_pattern: "^// [\\w+]+\\.swift\\n// MenuBarKit"

# ── Disabled rules ────────────────────────────────────────────────────────────
disabled_rules:
  - todo
  - trailing_comma
  - vertical_whitespace_opening_braces
  - multiple_closures_with_trailing_closure

line_length:
  warning: 200
  error: 240

file_length:
  warning: 620
  error: 800

cyclomatic_complexity:
  warning: 17
  error: 30

function_body_length:
  warning: 90
  error: 150

type_body_length:
  warning: 400
  error: 600

function_parameter_count:
  warning: 6
  error: 8
